<div class="container">
  <div class="mat-h5 uppercase">In this article</div>

  <mat-tree #tree [dataSource]="_headers" [childrenAccessor]="childrenAccessor">
    <mat-tree-node
      *matTreeNodeDef="let node"
      matTreeNodePadding
      [matTreeNodePaddingIndent]="10">
      <button mat-icon-button disabled></button>
      <a
        routerLink="."
        [fragment]="node.id"
        [ngClass]="{ current: node.id === activeHeader }"
        >{{ node.heading }}</a
      >
    </mat-tree-node>
    <mat-tree-node
      *matTreeNodeDef="let node; when: hasChild"
      matTreeNodePadding
      [matTreeNodePaddingIndent]="10">
      <button
        class="expand"
        mat-icon-button
        matTreeNodeToggle
        [attr.aria-label]="'Toggle ' + node.heading">
        <mat-icon class="mat-icon-rtl-mirror">
          {{ tree.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
        </mat-icon>
      </button>
      <a
        routerLink="."
        [fragment]="node.id"
        [ngClass]="{ current: node.id === activeHeader }"
        >{{ node.heading }}</a
      >
    </mat-tree-node>
  </mat-tree>
</div>
